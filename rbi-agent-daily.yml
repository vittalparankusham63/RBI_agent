name: RBI Agent Daily Run

on:
  schedule:
    # Runs at 7:00 AM IST daily (1:30 AM UTC, since IST = UTC+5:30)
    - cron: '30 1 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the GitHub Actions tab too

permissions:
  contents: write   # needed so the workflow can commit the updated dashboard + database back

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Run the agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python cloud_run.py

      - name: Commit and push updated dashboard and database
        run: |
          git config --global user.name "RBI Agent Bot"
          git config --global user.email "actions@github.com"
          git add docs/index.html rbi_agent.db
          git diff --quiet --cached || git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
